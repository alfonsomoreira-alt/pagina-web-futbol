<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro - KickOff</title>
  <link rel="stylesheet" href="estilos.css" />
  <script>
    // Función para validar el formulario
    function validarFormulario(event) {
      // Obtener los valores de los campos
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      // Validar que todos los campos estén llenos
      if (!nombre || !email || !password || !confirmPassword) {
        alert("Por favor, completa todos los campos.");
        event.preventDefault();  // Evitar el envío del formulario
        return false;
      }

      // Validar que las contraseñas coincidan
      if (password !== confirmPassword) {
        alert("Las contraseñas no coinciden.");
        event.preventDefault();  // Evitar el envío del formulario
        return false;
      }

      // Si todo está bien, redirigir al login
      setTimeout(function() {
        window.location.href = 'login.html';  // Redirigir a login.html
      }, 1000);  // Espera 1 segundo antes de redirigir (para que el formulario se procese)

      // Impedir que el formulario se envíe realmente (evitar recarga)
      event.preventDefault();
      return true;
    }
  </script>
</head>
<body>
  <main class="container">
    <!-- Logo -->
    <img src="KickOff.png" alt="Logo de KickOff" class="logo" />

    <h1 class="titulo-centro">Registrarse</h1>

    <!-- Formulario de registro con evento onsubmit para llamar a la validación -->
    <form onsubmit="return validarFormulario(event)" method="POST" class="form-registro">
      <label for="nombre">Nombre completo:</label>
      <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo" />

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com" />

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required placeholder="Contraseña" />

      <label for="confirm_password">Confirmar contraseña:</label>
      <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repite la contraseña" />

      <!-- Botón de registrar centrado -->
      <button type="submit" class="btn">Registrarse</button>
    </form>

    <!-- Pie con botón volver a la izquierda y enlace a la derecha -->
    <div class="pie-pagina">
      <a href="index.html" class="btn volver-inicio">Volver al inicio</a>
      <p class="enlace-login">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
      </p>
    </div>
  </main>
</body>
</html>

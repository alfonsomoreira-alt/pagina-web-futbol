<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - KickOff</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <main class="container">
        <h1 class="titulo-centro">Iniciar sesión</h1>
        <p class="descripcion">Accedé a tu cuenta para continuar</p>

        <!-- Formulario con acción hacia home.html -->
        <form class="form-login" action="home.html" method="get">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="Ingresá tu correo" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Ingresá tu contraseña" required>

            <a href="recuperar.html" class="enlace-olvido">¿Olvidaste tu contraseña?</a>

            <button type="submit" class="btn">Entrar</button>
        </form>

        <div class="pie-pagina">
            <a href="index.html" class="btn volver-inicio">Volver al inicio</a>
            <p class="enlace-login">¿No tenés una cuenta? <a href="registro.html">Registrate</a></p>
        </div>
    </main>

</body>
</html>

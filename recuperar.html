<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña - KickOff</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <main class="container">
        <h1 class="titulo-centro">Recuperar contraseña</h1>
        <p class="descripcion">Ingresá tu correo electrónico para recibir un enlace de restablecimiento.</p>

        <form class="form-login">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="Ingresá tu correo" required>

            <button type="submit" class="btn">Enviar enlace de recuperación</button>
        </form>

        <div class="pie-pagina">
            <a href="index.html" class="btn volver-inicio">Volver al inicio</a>
            <!-- ✅ Corregido: todo en una sola línea -->
            <p class="enlace-login">¿Recordaste tu contraseña?<a href="login.html"> Iniciá sesión </a></p>
        </div>
    </main>

</body>
</html>
